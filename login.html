<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

    <style>
        #login-page{
            background-color: yellow;
            display: none;
        }
        #scooter-img{
            height: 100%;
            width: 100%;
            margin-top: 60px;
            margin-left: 10px;
        }
        
    </style>
</head>
<body id="login-page">
    <img id="scooter-img" src="image/blinkit scootey.png" alt="">
    <div class="login-icon-page" id="login-icon-page">
            <div class="main-login">
                <img src="image/app_logo.svg" alt="">
                <h2>India's last minute app</h2>
                <p>Log in or Sign up</p>
                <div class="phone-box">
                    <span>+91</span>
                    <input type="tel" placeholder="Enter your number" maxlength="10">
                </div>
                <button id="Continue-btn">Continue</button>
            </div>
            <div class="login-footer">
                <p>By continuing, you agree to our Terms of service & Privacy policy</p>

            </div>

        </div>
    
</body>
</html>
